<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — ARCO STUDIO</title>
  <!-- TODO: GTM Head snippet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- TODO: GTM Body noscript -->

  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-left">
        <a href="plp.html">Collection</a>
        <a href="plp.html?cat=Outerwear">Outerwear</a>
        <a href="plp.html?cat=Knitwear">Knitwear</a>
      </div>
      <a href="index.html" class="nav-logo">Arco</a>
      <div class="nav-right">
        <a href="cart.html" class="cart-btn">
          <span>Cart</span>
          <span class="cart-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span id="cart-count"></span>
          </span>
        </a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Your Cart</h1>
    </div>
    <div id="cart-content"></div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">Arco</div>
      <p class="footer-copy">© 2025 Arco Studio. Demo store — no real transactions.</p>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function renderCart() {
      const items = Cart.get();
      const content = document.getElementById('cart-content');

      if (items.length === 0) {
        content.innerHTML = `
          <div class="empty-cart">
            <h2>Your cart is empty</h2>
            <p>Add something beautiful to get started.</p>
            <a href="plp.html" class="btn-primary">Explore Collection</a>
          </div>
        `;
        return;
      }

      const subtotal = Cart.total();
      const shipping = subtotal >= 200 ? 0 : 12;
      const total = subtotal + shipping;

      // DL: view_cart
      dataLayer.push({ ecommerce: null });
      dataLayer.push({
        event: 'view_cart',
        ecommerce: {
          currency: 'EUR',
          value: total,
          items: Cart.getItemsForDL()
        }
      });

      content.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items">
            ${items.map((item, i) => {
              const p = PRODUCTS.find(p => p.id === item.productId);
              if (!p) return '';
              return `
                <div class="cart-item" id="item-${i}">
                  <a href="pdp.html?id=${p.id}">
                    <div class="cart-item-img">
                      <img src="${p.image}" alt="${p.name}">
                    </div>
                  </a>
                  <div>
                    <p class="cart-item-name">${p.name}</p>
                    <p class="cart-item-meta">Size: ${item.size} · ${p.category}</p>
                    <div class="qty-control">
                      <button class="qty-btn" onclick="changeQty(${i}, ${item.quantity - 1})">−</button>
                      <span class="qty-val">${item.quantity}</span>
                      <button class="qty-btn" onclick="changeQty(${i}, ${item.quantity + 1})">+</button>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${i})">Remove</button>
                  </div>
                  <div>
                    <p class="cart-item-price">${formatPrice(p.price * item.quantity)}</p>
                    <p style="font-size:12px;color:var(--mid);text-align:right;margin-top:4px">${formatPrice(p.price)} each</p>
                  </div>
                </div>
              `;
            }).join('')}
          </div>

          <div class="cart-summary">
            <h2 class="summary-title">Order Summary</h2>
            <div class="summary-row">
              <span>Subtotal</span>
              <span>${formatPrice(subtotal)}</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span>${shipping === 0 ? 'Free' : formatPrice(shipping)}</span>
            </div>
            ${shipping > 0 ? `<p style="font-size:11px;color:var(--accent);margin-bottom:12px">Add ${formatPrice(200 - subtotal)} for free shipping</p>` : ''}
            <div class="summary-row total">
              <span>Total</span>
              <span class="amount">${formatPrice(total)}</span>
            </div>
            <button class="btn-primary" style="width:100%;justify-content:center;margin-top:20px" 
                    onclick="goToCheckout()">
              Proceed to Checkout
            </button>
            <a href="plp.html" class="btn-secondary" style="width:100%;justify-content:center;margin-top:8px">
              Continue Shopping
            </a>
          </div>
        </div>
      `;
    }

    function changeQty(index, qty) {
      Cart.updateQuantity(index, qty);
      renderCart();
    }

    function removeItem(index) {
      Cart.remove(index);
      renderCart();
    }

    function goToCheckout() {
      const items = Cart.getItemsForDL();
      const total = Cart.total();
      dataLayer.push({ ecommerce: null });
      dataLayer.push({
        event: 'begin_checkout',
        ecommerce: {
          currency: 'EUR',
          value: total,
          items: items
        }
      });
      window.location.href = 'checkout.html';
    }

    renderCart();
  </script>
</body>
</html>
