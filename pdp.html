<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Product — ARCO STUDIO</title>
  <!-- TODO: GTM Head snippet -->
  <style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --cream: #F4F0E8;
  --white: #FDFCFA;
  --charcoal: #1A1917;
  --mid: #6B6760;
  --border: #DDD9D0;
  --accent: #B5694A;
  --accent-light: #E8C9B8;
  --success: #3D7A5E;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', sans-serif;
  --nav-h: 64px;
  --max: 1280px;
  --radius: 2px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--white);
  color: var(--charcoal);
  font-weight: 300;
  letter-spacing: 0.01em;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: var(--font-body); border: none; background: none; }
img { display: block; width: 100%; height: 100%; object-fit: cover; }
input, select, textarea { font-family: var(--font-body); }

/* ── NAV ── */
.nav {
  position: sticky; top: 0; z-index: 100;
  height: var(--nav-h);
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
}

.nav-inner {
  max-width: var(--max);
  margin: 0 auto;
  padding: 0 32px;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}

.nav-left { display: flex; gap: 28px; }
.nav-left a {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mid);
  transition: color 0.2s;
}
.nav-left a:hover, .nav-left a.active { color: var(--charcoal); }

.nav-logo {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  text-align: center;
}

.nav-right { display: flex; justify-content: flex-end; }

.cart-btn {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mid);
  padding: 8px 12px;
  transition: color 0.2s;
}
.cart-btn:hover { color: var(--charcoal); }

.cart-icon { position: relative; display: flex; }
.cart-icon svg { width: 18px; height: 18px; }

#cart-count {
  position: absolute;
  top: -6px; right: -8px;
  background: var(--accent);
  color: white;
  border-radius: 50%;
  width: 16px; height: 16px;
  font-size: 9px;
  font-weight: 500;
  display: none;
  align-items: center; justify-content: center;
}

/* ── FOOTER ── */
.footer {
  border-top: 1px solid var(--border);
  padding: 48px 32px;
  margin-top: 80px;
  background: var(--cream);
}

.footer-inner {
  max-width: var(--max);
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-logo {
  font-family: var(--font-display);
  font-size: 18px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.footer-copy {
  font-size: 11px;
  color: var(--mid);
  letter-spacing: 0.05em;
}

/* ── CONTAINER ── */
.container {
  max-width: var(--max);
  margin: 0 auto;
  padding: 0 32px;
}

/* ── HERO ── */
.hero {
  background: var(--cream);
  padding: 120px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 100%, var(--accent-light) 0%, transparent 70%);
  opacity: 0.4;
}

.hero-eyebrow {
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
  position: relative;
}

.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(52px, 8vw, 96px);
  font-weight: 300;
  line-height: 1.0;
  letter-spacing: -0.01em;
  margin-bottom: 28px;
  position: relative;
}

.hero h1 em { font-style: italic; color: var(--accent); }

.hero-sub {
  font-size: 14px;
  color: var(--mid);
  max-width: 420px;
  margin: 0 auto 40px;
  line-height: 1.7;
  position: relative;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--charcoal);
  color: var(--white);
  padding: 14px 32px;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 400;
  transition: background 0.2s, transform 0.2s;
  border-radius: var(--radius);
  position: relative;
}
.btn-primary:hover { background: var(--accent); }

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--charcoal);
  padding: 13px 32px;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 400;
  border: 1px solid var(--border);
  transition: border-color 0.2s, background 0.2s;
  border-radius: var(--radius);
}
.btn-secondary:hover { border-color: var(--charcoal); background: var(--cream); }

/* ── SECTION HEADER ── */
.section-header {
  padding: 64px 0 40px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}

.section-title {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 300;
  letter-spacing: -0.01em;
}

.section-link {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mid);
  border-bottom: 1px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.section-link:hover { color: var(--charcoal); border-color: var(--charcoal); }

/* ── PRODUCT GRID ── */
.product-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  margin-bottom: 2px;
}

.product-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

.product-card {
  background: var(--cream);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.product-card:hover .product-img img { transform: scale(1.04); }

.product-img {
  aspect-ratio: 3/4;
  overflow: hidden;
  background: var(--border);
}

.product-img img { transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

.product-badge {
  position: absolute;
  top: 12px; left: 12px;
  background: var(--charcoal);
  color: white;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: var(--radius);
}

.product-info {
  padding: 16px 16px 20px;
}

.product-name {
  font-size: 14px;
  font-weight: 400;
  margin-bottom: 4px;
  line-height: 1.3;
}

.product-category {
  font-size: 11px;
  color: var(--mid);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.product-price {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 400;
}

/* ── PAGE HEADER ── */
.page-header {
  padding: 64px 0 48px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
}

.page-header h1 {
  font-family: var(--font-display);
  font-size: 52px;
  font-weight: 300;
  letter-spacing: -0.02em;
  line-height: 1;
}

.page-header p {
  font-size: 14px;
  color: var(--mid);
  margin-top: 12px;
  line-height: 1.6;
}

/* ── PLP FILTERS ── */
.plp-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.filter-tags { display: flex; gap: 8px; flex-wrap: wrap; }

.filter-tag {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--mid);
  background: transparent;
}
.filter-tag:hover, .filter-tag.active {
  background: var(--charcoal);
  color: white;
  border-color: var(--charcoal);
}

.plp-count { font-size: 12px; color: var(--mid); }

/* ── PDP ── */
.pdp-layout {
  display: grid;
  grid-template-columns: 1fr 480px;
  gap: 80px;
  padding: 48px 0 80px;
  align-items: start;
}

.pdp-images .main-image {
  aspect-ratio: 3/4;
  background: var(--cream);
  border-radius: var(--radius);
  overflow: hidden;
}

.pdp-sticky { position: sticky; top: calc(var(--nav-h) + 32px); }

.pdp-eyebrow {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

.pdp-title {
  font-family: var(--font-display);
  font-size: 40px;
  font-weight: 300;
  line-height: 1.1;
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

.pdp-price {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 400;
  margin-bottom: 28px;
  color: var(--charcoal);
}

.pdp-desc {
  font-size: 14px;
  line-height: 1.75;
  color: var(--mid);
  margin-bottom: 32px;
}

.size-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
  font-weight: 400;
}

.size-grid { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }

.size-btn {
  width: 52px; height: 52px;
  border: 1px solid var(--border);
  font-size: 12px;
  letter-spacing: 0.05em;
  transition: all 0.2s;
  color: var(--mid);
}
.size-btn:hover { border-color: var(--charcoal); color: var(--charcoal); }
.size-btn.active { background: var(--charcoal); color: white; border-color: var(--charcoal); }

.btn-add-cart {
  width: 100%;
  background: var(--charcoal);
  color: white;
  padding: 18px;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 400;
  transition: background 0.2s;
  border-radius: var(--radius);
  margin-bottom: 12px;
}
.btn-add-cart:hover { background: var(--accent); }
.btn-add-cart:disabled { background: var(--border); color: var(--mid); cursor: not-allowed; }

.pdp-meta {
  margin-top: 32px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--mid);
  line-height: 2;
}

.pdp-meta span { color: var(--charcoal); font-weight: 400; }

/* ── CART ── */
.cart-layout {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 64px;
  padding: 48px 0 80px;
  align-items: start;
}

.cart-items { }

.cart-item {
  display: grid;
  grid-template-columns: 100px 1fr auto;
  gap: 24px;
  align-items: center;
  padding: 24px 0;
  border-bottom: 1px solid var(--border);
}

.cart-item-img {
  aspect-ratio: 3/4;
  background: var(--cream);
  border-radius: var(--radius);
  overflow: hidden;
}

.cart-item-name { font-size: 15px; font-weight: 400; margin-bottom: 4px; }
.cart-item-meta { font-size: 12px; color: var(--mid); margin-bottom: 12px; }

.qty-control {
  display: flex;
  align-items: center;
  gap: 0;
  border: 1px solid var(--border);
  width: fit-content;
}

.qty-btn {
  width: 32px; height: 32px;
  font-size: 16px;
  display: flex;
  align-items: center; justify-content: center;
  color: var(--mid);
  transition: color 0.2s, background 0.2s;
}
.qty-btn:hover { color: var(--charcoal); background: var(--cream); }

.qty-val {
  width: 40px; height: 32px;
  text-align: center;
  font-size: 13px;
  display: flex;
  align-items: center; justify-content: center;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

.cart-item-price {
  font-family: var(--font-display);
  font-size: 18px;
  text-align: right;
}

.remove-btn {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--mid);
  text-decoration: underline;
  margin-top: 8px;
  display: block;
  transition: color 0.2s;
}
.remove-btn:hover { color: var(--accent); }

.cart-summary {
  background: var(--cream);
  padding: 32px;
  border-radius: var(--radius);
  position: sticky;
  top: calc(var(--nav-h) + 24px);
}

.summary-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 300;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.summary-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 12px;
  color: var(--mid);
}

.summary-row.total {
  font-size: 16px;
  color: var(--charcoal);
  font-weight: 400;
  padding-top: 16px;
  margin-top: 8px;
  border-top: 1px solid var(--border);
}

.summary-row.total .amount {
  font-family: var(--font-display);
  font-size: 22px;
}

.empty-cart {
  text-align: center;
  padding: 80px 0;
}

.empty-cart h2 {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 300;
  margin-bottom: 12px;
}

.empty-cart p { font-size: 14px; color: var(--mid); margin-bottom: 32px; }

/* ── CHECKOUT ── */
.checkout-layout {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 64px;
  padding: 48px 0 80px;
  align-items: start;
}

.checkout-section {
  margin-bottom: 40px;
}

.checkout-section-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 300;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-grid.full { grid-template-columns: 1fr; }

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mid);
  font-weight: 400;
}

.form-group input,
.form-group select {
  border: 1px solid var(--border);
  padding: 12px 14px;
  font-size: 14px;
  color: var(--charcoal);
  background: var(--white);
  border-radius: var(--radius);
  transition: border-color 0.2s;
  outline: none;
}

.form-group input:focus,
.form-group select:focus { border-color: var(--charcoal); }

.form-group.span-2 { grid-column: 1 / -1; }

/* ── THANK YOU ── */
.thankyou-wrap {
  max-width: 640px;
  margin: 0 auto;
  padding: 80px 32px;
  text-align: center;
}

.ty-icon {
  width: 64px; height: 64px;
  background: var(--success);
  border-radius: 50%;
  display: flex;
  align-items: center; justify-content: center;
  margin: 0 auto 32px;
}

.ty-icon svg { width: 28px; height: 28px; color: white; }

.ty-title {
  font-family: var(--font-display);
  font-size: 52px;
  font-weight: 300;
  line-height: 1;
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}

.ty-sub {
  font-size: 15px;
  color: var(--mid);
  line-height: 1.7;
  margin-bottom: 40px;
}

.order-summary-box {
  background: var(--cream);
  border-radius: var(--radius);
  padding: 28px;
  text-align: left;
  margin-bottom: 40px;
}

.order-ref {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.order-ref span {
  color: var(--charcoal);
  font-weight: 400;
  font-size: 13px;
}

.ty-item {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  color: var(--mid);
}

.ty-item:last-child { border-bottom: none; }
.ty-item .name { color: var(--charcoal); }

/* ── NOTIFICATIONS ── */
.toast {
  position: fixed;
  bottom: 32px; right: 32px;
  background: var(--charcoal);
  color: white;
  padding: 14px 20px;
  font-size: 12px;
  letter-spacing: 0.05em;
  border-radius: var(--radius);
  transform: translateY(120%);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 1000;
}

.toast.show { transform: translateY(0); }

/* ── UTILITY ── */
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.gap-8 { gap: 8px; }
.text-mid { color: var(--mid); }

/* ── RESPONSIVE (basic) ── */
@media (max-width: 900px) {
  .product-grid { grid-template-columns: repeat(2, 1fr); }
  .product-grid.cols-4 { grid-template-columns: repeat(2, 1fr); }
  .pdp-layout, .cart-layout, .checkout-layout { grid-template-columns: 1fr; }
  .pdp-sticky { position: static; }
  .nav-inner { padding: 0 20px; }
  .nav-left { display: none; }
  .hero { padding: 80px 20px; }
  .container { padding: 0 20px; }
}

</style>
</head>
<body>
  <!-- TODO: GTM Body noscript -->

  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-left">
        <a href="plp.html">Collection</a>
        <a href="plp.html?cat=Outerwear">Outerwear</a>
        <a href="plp.html?cat=Knitwear">Knitwear</a>
      </div>
      <a href="index.html" class="nav-logo">Arco</a>
      <div class="nav-right">
        <a href="cart.html" class="cart-btn">
          <span>Cart</span>
          <span class="cart-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span id="cart-count"></span>
          </span>
        </a>
      </div>
    </div>
  </nav>

  <div class="container" style="padding-top:20px;padding-bottom:4px;">
    <a href="plp.html" style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--mid);">← Collection</a>
  </div>

  <main class="container" id="pdp-content"></main>

  <section class="container" style="border-top:1px solid var(--border);padding-top:48px;margin-bottom:80px;">
    <div class="section-header" style="padding-top:0">
      <h2 class="section-title">You may also like</h2>
    </div>
    <div class="product-grid" id="related-grid"></div>
  </section>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">Arco</div>
      <p class="footer-copy">© 2025 Arco Studio. Demo store — no real transactions.</p>
    </div>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="products.js"></script>
  <script src="cart.js"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    const params = new URLSearchParams(window.location.search);
    const productId = parseInt(params.get('id'));
    const product = PRODUCTS.find(p => p.id === productId);

    if (!product) {
      window.location.href = 'plp.html';
    } else {
      document.getElementById('page-title').textContent = product.name + ' — ARCO STUDIO';

      dataLayer.push({ ecommerce: null });
      dataLayer.push({
        event: 'view_item',
        ecommerce: {
          currency: 'EUR',
          value: product.price,
          items: [{ item_id: String(product.id), item_name: product.name, item_category: product.category, price: product.price, quantity: 1 }]
        }
      });

      let selectedSize = null;

      document.getElementById('pdp-content').innerHTML = `
        <div class="pdp-layout">
          <div class="pdp-images">
            <div class="main-image">
              <img src="${product.image}" alt="${product.name}">
            </div>
          </div>
          <div class="pdp-sticky">
            <p class="pdp-eyebrow">${product.category}</p>
            <h1 class="pdp-title">${product.name}</h1>
            <p class="pdp-price">${formatPrice(product.price)}</p>
            <p class="pdp-desc">${product.description}</p>
            <p class="size-label">Size ${product.sizes.length > 1 ? '<span style="color:var(--mid);font-weight:300">— Select one</span>' : ''}</p>
            <div class="size-grid" id="size-grid">
              ${product.sizes.map(s => `<button class="size-btn" onclick="selectSize('${s}')">${s}</button>`).join('')}
            </div>
            <button class="btn-add-cart" id="add-btn" onclick="handleAddToCart()" ${product.sizes.length > 1 ? 'disabled' : ''}>
              Add to Cart
            </button>
            <a href="cart.html" class="btn-secondary" style="width:100%;justify-content:center;margin-top:8px">View Cart</a>
            <div class="pdp-meta">
              <div>Material <span>${product.material}</span></div>
              <div>Delivery <span>3–5 working days</span></div>
              <div>Returns <span>Free within 30 days</span></div>
            </div>
          </div>
        </div>
      `;

      // Auto-select if only one size
      if (product.sizes.length === 1) {
        selectSize(product.sizes[0]);
      }

      function selectSize(size) {
        selectedSize = size;
        document.querySelectorAll('.size-btn').forEach(btn => {
          btn.classList.toggle('active', btn.textContent.trim() === size);
        });
        document.getElementById('add-btn').disabled = false;
      }

      function handleAddToCart() {
        if (!selectedSize) return;
        Cart.add(product.id, selectedSize, 1);
        const toast = document.getElementById('toast');
        toast.textContent = product.name + ' added to cart';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
      }

      // Expose to global scope (called from inline onclick)
      window.selectSize = selectSize;
      window.handleAddToCart = handleAddToCart;

      // Related products
      const related = PRODUCTS
        .filter(p => p.id !== product.id)
        .sort((a, b) => (b.category === product.category) - (a.category === product.category))
        .slice(0, 3);

      document.getElementById('related-grid').innerHTML = related.map(p => `
        <div class="product-card" onclick="window.location.href='pdp.html?id=${p.id}'">
          ${p.new ? '<span class="product-badge">New</span>' : ''}
          <div class="product-img">
            <img src="${p.image}" alt="${p.name}" loading="lazy">
          </div>
          <div class="product-info">
            <p class="product-category">${p.category}</p>
            <p class="product-name">${p.name}</p>
            <p class="product-price">${formatPrice(p.price)}</p>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
